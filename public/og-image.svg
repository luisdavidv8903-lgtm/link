<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B4F8A"/>
      <stop offset="1" stop-color="#2E75B6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1B4F8A"/>
      <stop offset="1" stop-color="#2E75B6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo mark -->
  <rect x="80" y="72" width="56" height="56" rx="14" fill="url(#mark)"/>
  <path d="M104 90 L92 100 L104 110" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M112 90 L124 100 L112 110" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="150" y="110" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800" fill="#1e293b">DELIVERYLINK</text>

  <!-- Badge -->
  <rect x="80" y="168" width="330" height="40" rx="20" fill="#DBEAFE"/>
  <text x="100" y="194" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1B4F8A">Hispanic American-Owned Small Business</text>

  <!-- Headline -->
  <text x="78" y="290" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800" fill="#0f172a">IT Modernization &amp;</text>
  <text x="78" y="358" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800" fill="#1B4F8A">AI-Driven Automation</text>

  <!-- Subtitle -->
  <text x="80" y="420" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#64748b">Cutting operational costs for federal agencies with AI automation,</text>
  <text x="80" y="452" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#64748b">secure cloud architecture, and Section 508-compliant software.</text>

  <!-- Trust row -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#334155">
    <circle cx="90" cy="530" r="8" fill="#22c55e"/>
    <text x="108" y="537">SAM.gov Registered</text>
    <circle cx="330" cy="530" r="8" fill="#22c55e"/>
    <text x="348" y="537">CAGE: 21GG9</text>
    <circle cx="530" cy="530" r="8" fill="#22c55e"/>
    <text x="548" y="537">Section 508 Compliant</text>
  </g>

  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)"/>
</svg>
